<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Sankalp Digital Pathshala</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body style="background:var(--navy); display:flex; justify-content:center; align-items:center; min-height:100vh; padding:2rem;">

  <div class="card card-glass" style="width:100%; max-width:400px; background:#fff;">
    <div style="text-align:center; margin-bottom:2rem;">
      <h2 style="color:var(--navy);">Admin Workspace</h2>
      <p style="color:var(--slate); margin-top:0.25rem;">Authorized Personnel Only</p>
    </div>
    <form id="admin-login-form">
      <div class="form-group">
        <label class="form-label" for="login-email">Admin Email *</label>
        <input type="email" class="form-control" id="login-email" placeholder="admin@sankalp.edu" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="login-pass">Admin Password *</label>
        <input type="password" class="form-control" id="login-pass" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:1rem;">Sign In</button>
    </form>
    <div style="text-align:center; margin-top:1.5rem;">
      <a href="index.html" style="color:var(--primary); font-size:0.9rem; font-weight:600;">← Back to Public Website</a>
    </div>
  </div>

  <script src="/assets/app.js"></script>
</body>
</html>
