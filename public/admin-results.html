<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results Manager | Sankalp Digital Pathshala</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="container nav-container">
      <a href="index.html" class="logo">Sankalp<span>Pathshala</span></a>
      <button class="btn btn-outline" id="admin-logout-btn" style="padding:0.4rem 0.85rem; border-color:#dc2626; color:#dc2626;">Sign Out</button>
    </div>
  </header>

  <div class="admin-wrapper">
    <aside class="sidebar">
      <ul class="sidebar-menu">
        <li><a href="admin-dashboard.html" class="sidebar-link">Dashboard Stats</a></li>
        <li><a href="admin-dashboard.html" class="sidebar-link">Leads CRM</a></li>
        <li><a href="admin-dashboard.html" class="sidebar-link">Inquiries CRM</a></li>
        <li><a href="admin-results.html" class="sidebar-link active">Results Manager</a></li>
        <li><a href="admin-dashboard.html" class="sidebar-link">Gallery Manager</a></li>
        <li><a href="admin-dashboard.html" class="sidebar-link">Events Manager</a></li>
      </ul>
    </aside>

    <main class="admin-main">
      <div class="admin-header-row">
        <h2>Marksheet Records publisher</h2>
      </div>

      <div class="grid-2" style="grid-template-columns: 350px 1fr; align-items: flex-start;">
        
        <!-- Add / Edit Form -->
        <div class="card" id="form-card-container">
          <h3 id="form-title">Publish New Result</h3>
          <form id="result-publish-form" style="margin-top:1.5rem;" enctype="multipart/form-data">
            <input type="hidden" id="edit-id">
            
            <div class="form-group">
              <label class="form-label" for="res-reg">Registration No *</label>
              <input type="text" class="form-control" id="res-reg" placeholder="SDP-2026-0001" required style="text-transform: uppercase;">
            </div>

            <div class="form-group">
              <label class="form-label" for="res-name">Student Name *</label>
              <input type="text" class="form-control" id="res-name" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="res-father">Father's Name *</label>
              <input type="text" class="form-control" id="res-father" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="res-dob">Date of Birth *</label>
              <input type="date" class="form-control" id="res-dob" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="res-grade">Grade / Score *</label>
              <input type="text" class="form-control" id="res-grade" placeholder="e.g. A+ or 92%" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="res-remarks">Remarks</label>
              <textarea class="form-control" id="res-remarks" placeholder="Student academic comments..." style="min-height:70px;"></textarea>
            </div>

            <div class="form-group">
              <label class="form-label" for="res-photo">Student Photo (Optional)</label>
              <input type="file" class="form-control" id="res-photo" accept="image/*">
              <div id="res-photo-preview" style="margin-top:0.5rem; display:none; justify-content:center;">
                <img id="img-preview-tag" style="width:80px; height:90px; object-fit:cover; border:1px solid var(--border);" alt="Preview">
              </div>
            </div>

            <div class="form-group" style="display:flex; align-items:center; gap:0.5rem;">
              <input type="checkbox" id="res-published" checked>
              <label for="res-published">Publish and Make Publicly Searchable</label>
            </div>

            <div style="display:flex; gap:0.5rem;">
              <button type="submit" class="btn btn-primary" style="flex:1;" id="submit-btn-lbl">Publish</button>
              <button type="button" class="btn btn-outline" id="cancel-edit-btn" style="display:none; color:#dc2626; border-color:#dc2626;">Cancel</button>
            </div>

          </form>
        </div>

        <!-- Listings Tables -->
        <div class="card">
          <h3>Published Marksheets</h3>
          <div class="table-responsive" style="margin-top:1.5rem;">
            <table class="table">
              <thead>
                <tr>
                  <th>Photo</th>
                  <th>Reg No</th>
                  <th>Student Name</th>
                  <th>Grade</th>
                  <th>DOB</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="results-tbody">
                <tr>
                  <td colspan="6" style="text-align:center;">Loading published marksheet list...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="/assets/app.js"></script>
  <script>
    // Protect Admin routes
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const authRes = await fetch('/api/admin/check-auth');
        if (!authRes.ok) {
          window.location.href = '/admin-login.html';
          return;
        }
      } catch (err) {
        window.location.href = '/admin-login.html';
        return;
      }
      loadPublishedResults();
    });

    const resPhoto = document.getElementById('res-photo');
    const photoPreviewDiv = document.getElementById('res-photo-preview');
    const imgPreviewTag = document.getElementById('img-preview-tag');

    // Handle student image preview
    if (resPhoto) {
      resPhoto.addEventListener('change', () => {
        if (resPhoto.files && resPhoto.files[0]) {
          photoPreviewDiv.style.display = 'flex';
          imgPreviewTag.src = URL.createObjectURL(resPhoto.files[0]);
        } else {
          photoPreviewDiv.style.display = 'none';
        }
      });
    }

    const tbody = document.getElementById('results-tbody');
    const form = document.getElementById('result-publish-form');
    const formTitle = document.getElementById('form-title');
    const submitBtnLbl = document.getElementById('submit-btn-lbl');
    const cancelEditBtn = document.getElementById('cancel-edit-btn');
    const editIdInput = document.getElementById('edit-id');

    async function loadPublishedResults() {
      if (!tbody) return;
      try {
        const res = await fetch('/api/admin/results');
        const list = await res.json();
        tbody.innerHTML = '';
        list.forEach(student => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>
              <div style="width:40px; height:45px; overflow:hidden; border:1px solid var(--border); background:#eee; display:flex; align-items:center; justify-content:center;">
                ${student.photo ? `<img src="${student.photo}" style="width:100%; height:100%; object-fit:cover;">` : '<span style="font-size:0.5rem; text-align:center;">NO IMAGE</span>'}
              </div>
            </td>
            <td><strong>${student.registrationNumber}</strong></td>
            <td>${student.studentName}</td>
            <td><span class="badge badge-converted">${student.grade}</span></td>
            <td>${student.dob}</td>
            <td>
              <button onclick="editResult('${student._id}')" class="btn btn-outline" style="padding:0.25rem 0.5rem; font-size:0.8rem; display:inline-block;">Edit</button>
              <button onclick="deleteResult('${student._id}')" class="btn btn-outline" style="padding:0.25rem 0.5rem; font-size:0.8rem; color:#dc2626; border-color:#dc2626; display:inline-block; margin-left:0.25rem;">Delete</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        console.error("Results list load failure", err);
      }
    }

    // Submit handler (Publish & Edit PUT)
    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const editId = editIdInput.value;
        const btn = form.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.textContent = 'Processing request...';

        const formData = new FormData();
        formData.append('registrationNumber', document.getElementById('res-reg').value);
        formData.append('studentName', document.getElementById('res-name').value);
        formData.append('fatherName', document.getElementById('res-father').value);
        formData.append('dob', document.getElementById('res-dob').value);
        formData.append('grade', document.getElementById('res-grade').value);
        formData.append('remarks', document.getElementById('res-remarks').value);
        formData.append('published', document.getElementById('res-published').checked);
        if (resPhoto.files && resPhoto.files[0]) {
          formData.append('photo', resPhoto.files[0]);
        }

        const url = editId ? `/api/admin/results/${editId}` : '/api/admin/results';
        const method = editId ? 'PUT' : 'POST';

        try {
          const res = await fetch(url, {
            method: method,
            body: formData
          });

          const data = await res.json();
          if (res.ok) {
            alert(editId ? 'Marksheet updated!' : 'Marksheet published successfully!');
            resetForm();
            loadPublishedResults();
          } else {
            alert(data.error || 'Failed to submit marksheet.');
          }
        } catch(err) {
          alert('Network connection error.');
        } finally {
          btn.disabled = false;
          btn.textContent = editId ? 'Update' : 'Publish';
        }
      });
    }

    // Retrieve fields data for editing
    window.editResult = async (id) => {
      try {
        const res = await fetch('/api/admin/results');
        const list = await res.json();
        const student = list.find(s => s._id === id);
        if (!student) return;

        editIdInput.value = student._id;
        document.getElementById('res-reg').value = student.registrationNumber;
        document.getElementById('res-name').value = student.studentName;
        document.getElementById('res-father').value = student.fatherName;
        document.getElementById('res-dob').value = student.dob;
        document.getElementById('res-grade').value = student.grade;
        document.getElementById('res-remarks').value = student.remarks || '';
        document.getElementById('res-published').checked = student.published;

        formTitle.textContent = 'Edit Student Marksheet';
        submitBtnLbl.textContent = 'Update';
        cancelEditBtn.style.display = 'inline-block';
        
        if (student.photo) {
          photoPreviewDiv.style.display = 'flex';
          imgPreviewTag.src = student.photo;
        } else {
          photoPreviewDiv.style.display = 'none';
        }

        document.getElementById('form-card-container').scrollIntoView({ behavior: 'smooth' });
      } catch (err) {
        alert('Failed to retrieve marksheet info.');
      }
    };

    window.deleteResult = async (id) => {
      if (!confirm('Are you sure you want to delete this marksheet record?')) return;
      try {
        const res = await fetch(`/api/admin/results/${id}`, { method: 'DELETE' });
        if (res.ok) {
          alert('Record deleted.');
          loadPublishedResults();
        }
      } catch(e) {
        alert('Delete request timed out.');
      }
    };

    const resetForm = () => {
      form.reset();
      editIdInput.value = '';
      formTitle.textContent = 'Publish New Result';
      submitBtnLbl.textContent = 'Publish';
      cancelEditBtn.style.display = 'none';
      photoPreviewDiv.style.display = 'none';
    };

    if (cancelEditBtn) {
      cancelEditBtn.addEventListener('click', resetForm);
    }
  </script>
</body>
</html>
